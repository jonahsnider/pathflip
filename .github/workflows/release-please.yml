on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

name: release-please

jobs:
  release-please:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # The logic below handles the npm publication:
      - name: Checkout Git repository
        # these if statements ensure that a publication only occurs when
        # a new release is created:
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
      - name: Enable Corepack
        # Required due to a limitation in setup-node https://github.com/actions/setup-node/issues/480#issuecomment-1820622085
        run: corepack enable
        if : ${{ steps.release.outputs.release_created }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: yarn
        if: ${{ steps.release.outputs.release_created }}
      - name: Install dependencies with Yarn
        if: ${{ steps.release.outputs.release_created }}
        run: yarn install --immutable
      - name: Build
        run: yarn run build
        if: ${{ steps.release.outputs.release_created }}
      - name: Lint
        run: yarn run lint
        if: ${{ steps.release.outputs.release_created }}
      - name: Publish
        run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.release_created }}
      - name: Install Pkl CLI
        if: ${{ steps.release.outputs.release_created }}
        uses: pkl-community/setup-pkl@5bb6ac805eb51
        with:
          pkl-version: 0.31.1
      - name: Build Pkl package
        if: ${{ steps.release.outputs.release_created }}
        run: pkl project package --skip-publish-check
      - name: Upload Pkl package artifacts to release
        if: ${{ steps.release.outputs.release_created }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" .out/*/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
